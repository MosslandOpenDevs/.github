name: Documentation
description: Report documentation that is wrong, unclear, or missing.
labels:
  - documentation
body:
  - type: input
    id: location
    attributes:
      label: Location
      description: The file or URL containing the affected documentation.
      placeholder: "README.md section 3, or a page URL"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing
      description: Quote the affected text where possible, or describe what is absent.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Proposed wording or structure, if you have one.
    validations:
      required: false
  - type: checkboxes
    id: disclosure
    attributes:
      label: Disclosure check
      options:
        - label: This issue contains no secrets, personal data, or actionable vulnerability detail
          required: true
