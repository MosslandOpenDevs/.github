name: Feature request
description: Propose an improvement or new capability for this repository.
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem before the solution. Do not include suspected
        vulnerability detail here; use private reporting per SECURITY.md.
  - type: textarea
    id: motivation
    attributes:
      label: Problem and motivation
      description: The problem this proposal addresses and who is affected by it.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you propose, concretely enough to evaluate.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why they fall short.
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: What is explicitly in and out of scope, and any constraints on the change.
    validations:
      required: false
  - type: checkboxes
    id: disclosure
    attributes:
      label: Disclosure check
      options:
        - label: This issue contains no secrets, personal data, or actionable vulnerability detail
          required: true
